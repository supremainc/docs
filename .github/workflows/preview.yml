name: Deploy to GitHub Pages

on:
  workflow_dispatch:
    inputs:
      name:
        description: "Deployment?"
        default: "Suprema"

permissions:
  contents: write

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      - name: Build website
        run: yarn build:preview
      - name: Remove duplicated locale img folders
        # Docusaurus는 다국어 빌드 시 static/img 전체를 로케일마다(en/es/ja) 그대로
        # 복사한다. Image/ProdImg 컴포넌트가 preview에서 공용 루트 /img 경로만
        # 참조하도록 되어 있어 로케일별 사본은 쓰이지 않으므로 삭제해 아티팩트
        # 용량을 줄인다 (GitHub Pages 1GB 제한 대응).
        run: rm -rf build/en/img build/es/img build/ja/img
      # Popular action to deploy to GitHub Pages:
      # Docs: https://github.com/peaceiris/actions-gh-pages#%EF%B8%8F-docusaurus
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Build output to publish to the `gh-pages` branch:
          publish_dir: ./build
          force_orphan: true
          # The following lines assign commit authorship to the official
          # GH-Actions bot for deploys to `gh-pages` branch:
          # https://github.com/actions/checkout/issues/13#issuecomment-724415212
          # The GH actions bot is used by default if you didn't specify the two fields.
          # You can swap them out with your own user credentials.
          user_name: github-actions[bot]
          user_email: 41898282+github-actions[bot]@users.noreply.github.com